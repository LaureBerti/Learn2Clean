# @package _global_
# ------------------------------------------------------------------------------
# TUTORIAL 10: ONE-SHOT PIPELINE SELECTION WITH DQN
# ------------------------------------------------------------------------------
#
# OBJECTIVE:
# Train a Deep Q-Network (DQN) to select the optimal data cleaning pipeline
# in a single step (Contextual Bandit setting).
#
# Unlike the sequential approach (building step-by-step), here the agent
# observes the dataset statistics and immediately chooses a full pipeline
# (e.g., "Imputer -> Scaler -> OutlierRemoval") from a pre-generated list.
#
# KEY CONCEPTS:
# 1. Environment: PermutationsCleaningEnv (One-Shot / combinatorial action space).
# 2. Agent: DQN with gamma=0.0 (No future states, immediate reward only).
# 3. Action Space: A discrete list of all valid pipeline permutations.
# ------------------------------------------------------------------------------

defaults:
  - default

  # ACTION SPACE REDUCTION
  # We use a reduced set of actions (6 actions) to keep the number of
  # possible permutations manageable (~150 combinations with max_len=3).
  # Using 'actions: all' would result in thousands of combinations,
  # making convergence too slow for a tutorial.
  - /actions: tutorial_07

  # BASE ENVIRONMENT
  - /env: permutation

  # AGENT CONFIGURATION
  # Loads the specific DQN config optimized for Bandits:
  # - Gamma = 0.0 (No future planning)
  # - MultiInputPolicy (To handle Dict observations)
  # - High exploration rate
  - /agent: dqn_permutation

  - _self_

# ------------------------------------------------------------------------------
# EXPERIMENT PARAMETERS
# ------------------------------------------------------------------------------
experiment:
  name: "10 Permutations Stable Baseline DQN"


  # In a Bandit setting, 1 Episode = 1 Decision (Trial).
  # We need enough trials (2000) for the epsilon-greedy strategy to explore
  # the combinatorial action space effectively before exploiting the best one.
  n_episodes: 2000

wandb:
  # Essential: Allows WandB to read and upload the local TensorBoard logs
  # generated by Stable Baselines3.
  sync_tensorboard: True